<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget</title>
    <link href="./media/styles.css" rel="stylesheet">
    <script type="module" src="index.js" defer></script>
</head>
<body>
    <!--This is the header, has a logo to the left and the title to the right.-->
    <header>
        <img src="./media/images/new-budget-logo.png">
        <h1>Justin's Budget</h1>
    </header>

    <!--This is the popup for adding Payments-->
    <div id="payment_popup">
        <div id="payment_top_popup">
            <h3>Add Payment</h3>
            <button class="close-btn">&times;</button>
        </div>
        <div class="form-row">
            <label for="category">Category</label>
            <select id="category">
                <option value=""></option>
                <option value="grocery">Grocery</option>
                <option value="rent">Rent</option>
                <option value="cary-payments">Car Payments</option>
                <option value="electric">Electric</option>
                <option value="subscriptions">Subscriptions</option>
                <option value="phone">Phone</option>
                <option value="internet">Internet</option>
                <option value="miscellaneous">Miscellaneous</option>
            </select>
        </div>
        <div class="form-row">
            <label for="amount">Amount</label>
            <input id="amount" type="number" placeholder="0.00">
            <div class="button" id="payment_button2">Submit</div>
        </div>
    </div>
    <main id="main_section">

        <!--This is the graph that will be to the left.-->
        <section id="graph">
            <h2>This is a graph section</h2>
        </section>

        <!--This is the stats section to the right-->
        <section id="stats_section">

            <!--This is the budget bar shows how close or over the budget you are.-->
            <div id="budget_bar">
                <h2 class="box-title" id="budget-top">Budget Box</h2>
                <h3>Budget Total</h3>
                <h3 id="budget_number" class="budget_data"></h3>
                <h3>Budget Used</h3>
                <h3 id="budget_used" class="budget_data"></h3>
                <h3>Budget Left</h3>
                <h3 id="budget_left" class="budget_data"></h3>
                <div id="bar">
                    <div class="bar-fill"></div>
                    <div id="marker_bar"></div>
                </div>
            </div>
            
            <!--This is the payments section-->
            <div id="payments">
                <div id="payments-top">
                    <h2 class="box-title">Payments</h2>
                    <img class="plus-icon" id="payment_button" src="./media/images/new-add-button.png">
                </div>
            </div>
        </section>

        <!--This is the Upcoming Bills Section-->
        <section id="upcoming_bills">
            <h2>Upcoming Bills</h2>
        </section>
    </main>
</body>
</html>
